<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hafız-ı Şirazi — Beyitler</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --surface: #ffffff;
    --surface-back: #fef9f0;
    --border: #d6c9a8;
    --text-dark: #2c1f0e;
    --text-mid: #5a4a32;
    --text-light: #8a7558;
    --accent: #8b4513;
    --accent-soft: #c8763a;
    --teal: #2a6b5a;
    --shadow: rgba(44,31,14,0.12);
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
background-color: var(–bg);
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: flex-start;
padding: 36px 16px 60px;
font-family: ‘Nunito Sans’, sans-serif;
color: var(–text-dark);
}

header {
text-align: center;
margin-bottom: 36px;
}

.brand {
font-family: ‘Lora’, serif;
font-size: clamp(1.2rem, 4vw, 1.7rem);
font-weight: 600;
color: var(–accent);
letter-spacing: 0.02em;
}

.subtitle {
font-size: 0.9rem;
color: var(–text-light);
margin-top: 5px;
letter-spacing: 0.04em;
}

.ornament {
display: block;
text-align: center;
color: var(–border);
font-size: 1.2rem;
margin: 10px 0;
letter-spacing: 0.4em;
}

/* Progress */
.progress-bar-wrap {
width: min(540px, 100%);
display: flex;
align-items: center;
gap: 12px;
margin-bottom: 24px;
}
.progress-bar-bg {
flex: 1;
height: 4px;
background: var(–border);
border-radius: 4px;
overflow: hidden;
}
.progress-bar-fill {
height: 100%;
background: var(–accent);
border-radius: 4px;
transition: width 0.4s ease;
}
.progress-label {
font-size: 0.8rem;
color: var(–text-light);
white-space: nowrap;
font-weight: 600;
}

/* Card scene */
.scene {
width: min(540px, 100%);
height: 360px;
perspective: 1200px;
cursor: pointer;
margin-bottom: 28px;
}

.card {
width: 100%;
height: 100%;
position: relative;
transform-style: preserve-3d;
transition: transform 0.65s cubic-bezier(.4,0,.2,1);
}

.card.flipped {
transform: rotateY(180deg);
}

.face {
position: absolute;
inset: 0;
backface-visibility: hidden;
border-radius: 16px;
padding: 40px 32px 32px;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
text-align: center;
border: 1.5px solid var(–border);
box-shadow: 0 4px 20px var(–shadow);
}

.face-front {
background: var(–surface);
}

.face-back {
transform: rotateY(180deg);
background: var(–surface-back);
border-color: #c8b98a;
}

.card-tag {
position: absolute;
top: 16px;
left: 18px;
font-size: 0.68rem;
font-weight: 700;
letter-spacing: 0.14em;
text-transform: uppercase;
color: var(–text-light);
}

.card-num {
position: absolute;
top: 16px;
right: 18px;
font-size: 0.75rem;
color: var(–text-light);
font-weight: 600;
}

.persian-text {
font-family: ‘Lora’, serif;
font-size: clamp(1.1rem, 3.5vw, 1.4rem);
line-height: 2.1;
color: var(–accent);
font-weight: 600;
direction: rtl;
unicode-bidi: bidi-override;
margin-bottom: 6px;
}

.transliteration {
font-family: ‘Lora’, serif;
font-size: 0.88rem;
color: var(–text-mid);
font-style: italic;
line-height: 1.9;
margin-top: 12px;
}

.divider {
width: 48px;
height: 1.5px;
background: var(–border);
margin: 16px auto;
}

.turkish-text {
font-family: ‘Lora’, serif;
font-size: clamp(1rem, 3vw, 1.18rem);
line-height: 1.95;
color: var(–text-dark);
font-style: italic;
}

.source-note {
position: absolute;
bottom: 16px;
font-size: 0.7rem;
color: var(–teal);
font-style: italic;
font-family: ‘Nunito Sans’, sans-serif;
}

.hint {
position: absolute;
bottom: 16px;
right: 18px;
font-size: 0.7rem;
color: var(–text-light);
font-style: italic;
}

/* Controls */
.controls {
display: flex;
gap: 12px;
align-items: center;
margin-bottom: 18px;
}

.btn {
background: var(–surface);
border: 1.5px solid var(–border);
color: var(–text-mid);
font-family: ‘Nunito Sans’, sans-serif;
font-size: 0.82rem;
font-weight: 600;
padding: 10px 22px;
border-radius: 50px;
cursor: pointer;
transition: all 0.2s;
}

.btn:hover {
background: var(–bg);
border-color: var(–accent-soft);
color: var(–accent);
}

.btn:disabled {
opacity: 0.3;
cursor: default;
}

.btn-flip {
background: var(–accent);
border-color: var(–accent);
color: #fff;
padding: 11px 32px;
font-size: 0.88rem;
}

.btn-flip:hover {
background: var(–accent-soft);
border-color: var(–accent-soft);
color: #fff;
}

/* Dots */
.dots {
display: flex;
gap: 7px;
margin-top: 6px;
flex-wrap: wrap;
justify-content: center;
max-width: 300px;
}
.dot {
width: 8px;
height: 8px;
border-radius: 50%;
background: var(–border);
transition: all 0.25s;
cursor: pointer;
}
.dot.active {
background: var(–accent);
transform: scale(1.25);
}
.dot.seen {
background: var(–accent-soft);
opacity: 0.6;
}

.meta-row {
display: flex;
gap: 20px;
align-items: center;
margin-top: 16px;
}
.meta-btn {
background: none;
border: none;
color: var(–text-light);
font-size: 0.8rem;
font-family: ‘Nunito Sans’, sans-serif;
font-weight: 600;
cursor: pointer;
transition: color 0.2s;
letter-spacing: 0.03em;
}
.meta-btn:hover { color: var(–accent); }

@media (max-width: 480px) {
.scene { height: 320px; }
.face { padding: 36px 22px 28px; }
.persian-text { font-size: 1rem; line-height: 2; }
.turkish-text { font-size: 0.96rem; }
.btn { padding: 9px 16px; font-size: 0.78rem; }
.btn-flip { padding: 10px 24px; }
}
</style>

</head>
<body>

<header>
  <div class="brand">Hafız-ı Şirazi</div>
  <span class="ornament">✦ ✦ ✦</span>
  <div class="subtitle">Divan'dan Seçme Beyitler · Farsça & Türkçe</div>
</header>

<div class="progress-bar-wrap">
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="progress-label" id="progressLabel">1 / 24</div>
</div>

<div class="scene" id="scene" onclick="flipCard()">
  <div class="card" id="card">
    <!-- Front -->
    <div class="face face-front">
      <div class="card-tag">Farsça</div>
      <div class="card-num" id="cardNum">01</div>
      <div class="persian-text" id="persianText"></div>
      <div class="transliteration" id="translit"></div>
      <div class="hint">Çevirmek için tıkla ↺</div>
    </div>
    <!-- Back -->
    <div class="face face-back">
      <div class="card-tag" style="color:var(--teal);font-weight:700">Türkçe Anlam</div>
      <div class="card-num" id="cardNum2">01</div>
      <div class="turkish-text" id="turkishText"></div>
      <div class="divider"></div>
      <div class="source-note" id="sourceNote"></div>
    </div>
  </div>
</div>

<div class="controls">
  <button class="btn" id="btnPrev" onclick="navigate(-1)">← Önceki</button>
  <button class="btn btn-flip" onclick="flipCard()">Çevir ↺</button>
  <button class="btn" id="btnNext" onclick="navigate(1)">Sonraki →</button>
</div>

<div class="dots" id="dots"></div>

<div class="meta-row">
  <button class="meta-btn" onclick="shuffleCards()">⇄ Karıştır</button>
  <button class="meta-btn" onclick="resetCards()">↺ Başa Dön</button>
</div>

    translit: "Her ke der hirmen-i ışk âteş nezed\nHîç nedânest kâyin âteş çe hâst",

  },

    source: "Divan — Tecellî ve ezeli aşk"

    translit: "Mey deh ki âkıl-ter ez în harf-hâ nehâhem şüd\nMen ânçe mî-hâhem ez to kemâl-i ışk est",
    turkish: "Şarap ver, zira bundan daha akıllı olamayacağım;\nsenden istediğim tek şey, aşkın kemâlidir.",

  },

    turkish: "Müjde geldi: keder günleri kalmayacak;\nbu haller de nasıl geçip gittiyse, bunlar da geçecek.",

let currentIndex = 0;
let isFlipped = false;
let seen = new Set();
let order = [...Array(cards.length).keys()];

function render() {
  const c = cards[order[currentIndex]];
  document.getElementById('persianText').innerHTML = c.persian.replace('\n', '<br>');
  document.getElementById('translit').innerHTML = c.translit.replace('\n', '<br>');
  document.getElementById('turkishText').innerHTML = c.turkish;
  document.getElementById('sourceNote').textContent = c.source;
  const num = String(currentIndex + 1).padStart(2, '0');
  document.getElementById('cardNum').textContent = num;
  document.getElementById('cardNum2').textContent = num;
  document.getElementById('progressLabel').textContent = `${currentIndex + 1} / ${cards.length}`;
  document.getElementById('progressFill').style.width = `${((currentIndex + 1) / cards.length) * 100}%`;
  document.getElementById('btnPrev').disabled = currentIndex === 0;
  document.getElementById('btnNext').disabled = currentIndex === cards.length - 1;
  renderDots();
}

function renderDots() {
  const wrap = document.getElementById('dots');
  wrap.innerHTML = '';
  order.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === currentIndex ? ' active' : (seen.has(i) ? ' seen' : ''));
    d.onclick = () => { goTo(i); };
    wrap.appendChild(d);
  });
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card').classList.toggle('flipped', isFlipped);
}

function navigate(dir) {
  seen.add(currentIndex);
  currentIndex = Math.max(0, Math.min(cards.length - 1, currentIndex + dir));
  isFlipped = false;
  document.getElementById('card').classList.remove('flipped');
  render();
}

function goTo(i) {
  seen.add(currentIndex);
  currentIndex = i;
  isFlipped = false;
  document.getElementById('card').classList.remove('flipped');
  render();
}

function shuffleCards() {
  for (let i = order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [order[i], order[j]] = [order[j], order[i]];
  }
  currentIndex = 0;
  isFlipped = false;
  seen.clear();
  document.getElementById('card').classList.remove('flipped');
  render();
}

function resetCards() {
  order = [...Array(cards.length).keys()];
  currentIndex = 0;
  isFlipped = false;
  seen.clear();
  document.getElementById('card').classList.remove('flipped');
  render();
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') navigate(1);
  else if (e.key === 'ArrowLeft') navigate(-1);
  else if (e.key === ' ') { e.preventDefault(); flipCard(); }
});

render();
</script>

</body>
