<!-- Apple Touch Icon (inline SVG → Canvas → PNG) -->
<script>
document.addEventListener('DOMContentLoaded', () => {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <rect width="512" height="512" rx="80" fill="#f5f0e8"/>
    <rect x="80" y="80" width="352" height="280" rx="20" fill="#ffffff" stroke="#d6c9a8" stroke-width="16"/>
    <rect x="80" y="360" width="352" height="12" rx="6" fill="#d6c9a8"/>
    <text x="256" y="260" font-family="serif" font-size="160" fill="#8b4513" text-anchor="middle" dominant-baseline="middle">ح</text>
    <rect x="100" y="400" width="312" height="60" rx="12" fill="#8b4513"/>
    <text x="256" y="430" font-family="serif" font-size="28" fill="#f5f0e8" text-anchor="middle" dominant-baseline="middle">Hafız</text>
  </svg>`;
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 512;
  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.onload = () => {
    ctx.drawImage(img, 0, 0);
    const iconLink = document.createElement('link');
    iconLink.rel = 'apple-touch-icon';
    iconLink.href = canvas.toDataURL('image/png');
    document.head.appendChild(iconLink);
  };
  img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
});
</script>

    source: "Divan — Sevgili ile diyalog"
  },
  {
    persian: "صوفی بیا که آینه صافیست جام را\nتا بنگری صفای می لعل فام را",
    translit: "Sûfî biyâ ki âyine sâfîst câm râ\nTâ bingirî safâ-yı mey-i la'l-fâm râ",
    turkish: "Ey sofu, gel, çünkü kadehin aynası berraktır;\nkırmızı şarabın saflığını göresin diye.",
    source: "Divan — Sofu'ya hitap"
  },
  {
    persian: "منم که شهره شهرم به عشق ورزیدن\nمنم که دیده نیالودم به بد دیدن",
    translit: "Menem ki şöhre-i şehrem be ışk-verzîden\nMenem ki dîde niyâlûdem be bed-dîden",
    turkish: "Şehirde aşk yaşamakla meşhur olan benim;\nkötüye bakmakla gözünü kirletmemiş olan da benim.",
    source: "Divan — Âşığın onuru"
  },
  {
    persian: "خوشا دلی که مدام از پی نظر نرود\nبه هر درت که زند راه بی‌خبر نرود",
    translit: "Hoşâ dilî ki mudâm ez pey-i nazar nerevved\nBe her deret ki zened râh bî-haber nerevved",
    turkish: "Ne mutlu o gönle ki her bakışın peşinden koşmaz;\nher kapıya farkında olmadan gitmez.",
    source: "Divan — Kalbin olgunluğu"
  },
  {
    persian: "رسید مژده که ایام غم نخواهد ماند\nچنان نماند چنین نیز هم نخواهد ماند",
    translit: "Resîd müjde ki eyyâm-ı gam nehâhed mând\nÇunân nemând çunîn nîz hem nehâhed mând",
    turkish: "Müjde geldi: keder günleri kalmayacak;\nbu haller de nasıl geçip gittiyse, bunlar da geçecek.",
    source: "Divan — Teselli ve geçicilik"
  }
];

let currentIndex = 0;
let isFlipped = false;
let seen = new Set();
let order = [...Array(cards.length).keys()];

function render() {
  const c = cards[order[currentIndex]];
  document.getElementById('persianText').innerHTML = c.persian.replace('\n', '<br>');
  document.getElementById('translit').innerHTML = c.translit.replace('\n', '<br>');
  document.getElementById('turkishText').innerHTML = c.turkish;
  document.getElementById('sourceNote').textContent = c.source;
  const num = String(currentIndex + 1).padStart(2, '0');
  document.getElementById('cardNum').textContent = num;
  document.getElementById('cardNum2').textContent = num;
  document.getElementById('progressLabel').textContent = `${currentIndex + 1} / ${cards.length}`;
  document.getElementById('progressFill').style.width = `${((currentIndex + 1) / cards.length) * 100}%`;
  document.getElementById('btnPrev').disabled = currentIndex === 0;
  document.getElementById('btnNext').disabled = currentIndex === cards.length - 1;
  renderDots();
}

function renderDots() {
  const wrap = document.getElementById('dots');
  wrap.innerHTML = '';
  order.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === currentIndex ? ' active' : (seen.has(i) ? ' seen' : ''));
    d.onclick = () => { goTo(i); };
    wrap.appendChild(d);
  });
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card').classList.toggle('flipped', isFlipped);
}

function navigate(dir) {
  seen.add(currentIndex);
  currentIndex = Math.max(0, Math.min(cards.length - 1, currentIndex + dir));
  isFlipped = false;
  document.getElementById('card').classList.remove('flipped');
  render();
}

function goTo(i) {
  seen.add(currentIndex);
  currentIndex = i;
  isFlipped = false;
  document.getElementById('card').classList.remove('flipped');
  render();
}

function shuffleCards() {
  for (let i = order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [order[i], order[j]] = [order[j], order[i]];
  }
  currentIndex = 0;
  isFlipped = false;
  seen.clear();
  document.getElementById('card').classList.remove('flipped');
  render();
}

function resetCards() {
  order = [...Array(cards.length).keys()];
  currentIndex = 0;
  isFlipped = false;
  seen.clear();
  document.getElementById('card').classList.remove('flipped');
  render();
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') navigate(1);
  else if (e.key === 'ArrowLeft') navigate(-1);
  else if (e.key === ' ') { e.preventDefault(); flipCard(); }
});

render();
</script>
</body>
</html>
